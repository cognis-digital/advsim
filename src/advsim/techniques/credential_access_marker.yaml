id: credential_access.file_access_marker
name: Credential Store Access Attempt (emulated, sandbox decoy)
attack_id: T1552.001
attack_name: "Unsecured Credentials: Credentials In Files"
tactic: Credential Access
description: >
  Benignly emulates an adversary reading a credentials file. advsim creates a
  clearly-labeled DECOY file in its sandbox (containing NO real secrets) and then
  reads it, generating the file-access telemetry a detection for credential-file
  access keys on. advsim never touches real credential stores, keychains,
  browsers, or the LSASS process — it has no credential-theft capability.
platforms: [all]
capabilities: [sandbox_file_write, read_only_query, log_event]
expected_telemetry:
  - "Read access to a file matching a credential-file name pattern"
  - "For this emulation: read of a labeled sandbox decoy (no real secret)"
simulate:
  - action: write_marker_file
    path: "creds/decoy-credentials.txt"
    content: "DECOY ONLY - no real secret - advsim benign emulation"
  - action: read_file
    path: "creds/decoy-credentials.txt"
  - action: log_event
    message: "emulated T1552.001 credentials-in-files access (sandbox decoy only)"
cleanup:
  - action: delete_marker_file
    path: "creds/decoy-credentials.txt"
  - action: delete_marker_file
    path: activity.log
references:
  - https://attack.mitre.org/techniques/T1552/001/
